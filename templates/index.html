<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An interactive, gamified guide mapping out your civic journey to Election Day.">
    <title>The Civic Journey</title>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* Critical Layout Styles to prevent blank screen issues */
        .screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .hidden {
            display: none !important;
        }
        .active {
            display: flex !important;
        }
        .map-container {
            flex: 1;
            position: relative;
            width: 100%;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
        }
        .path-svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <!-- Accessibility Region for Screen Readers -->
    <div id="aria-live-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>

    <section id="onboarding-screen" class="screen active" aria-labelledby="onboarding-title">
        <div class="background-decor blob1" aria-hidden="true"></div>
        <div class="background-decor blob2" aria-hidden="true"></div>
        <div class="glass-card">
            <h1 id="onboarding-title">Indian Election Journey</h1>
            <p>Enter your Pincode to navigate your path to the Polling Booth.</p>
            <div class="input-group">
                <input type="text" id="state-input" placeholder="Enter 6-digit Pincode" aria-label="Enter your pincode">
                <button id="start-journey-btn" aria-label="Start your journey">Let's Go</button>
            </div>
        </div>
    </section>

    <main id="journey-screen" class="screen hidden" aria-labelledby="header-location">
        <header>
            <h2 id="header-location" tabindex="-1">My Civic Journey</h2>
            <div class="progress-bar-container" aria-hidden="true">
                <div id="progress-fill"></div>
            </div>
        </header>

        <section class="map-container" aria-label="Interactive Map of the Voting Process">
            <svg class="path-svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
                <path d="M 100,500 C 100,200 400,500 400,250 C 400,100 700,300 700,50" 
                      fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="15" stroke-linecap="round"/>
                <path d="M 100,500 C 100,200 400,500 400,250 C 400,100 700,300 700,50" 
                      fill="none" stroke="#4dabf7" stroke-width="5" stroke-dasharray="10 10" class="animated-path"/>
            </svg>

            <div class="map-nodes">
                <!-- Using div with tabindex/role enables keyboard navigation -->
                <div class="node" tabindex="0" role="button" aria-label="Step 1: Voter Registration" style="left: 10%; top: 80%;" data-stop="1" data-title="Voter Registration (Form 6)">
                    <div class="node-circle pulse" aria-hidden="true">1</div>
                    <div class="node-label">Registration</div>
                </div>
                <div class="node" tabindex="0" role="button" aria-label="Step 2: Check Electoral Roll" style="left: 30%; top: 55%;" data-stop="2" data-title="Electoral Roll Search">
                    <div class="node-circle" aria-hidden="true">2</div>
                    <div class="node-label">Search Roll</div>
                </div>
                <div class="node" tabindex="0" role="button" aria-label="Step 3: Know Your Candidates" style="left: 50%; top: 40%;" data-stop="3" data-title="Candidate Research (KYC)">
                    <div class="node-circle" aria-hidden="true">3</div>
                    <div class="node-label">Candidates</div>
                </div>
                <div class="node" tabindex="0" role="button" aria-label="Step 4: Locate Polling Station" style="left: 70%; top: 25%;" data-stop="4" data-title="Polling Station Location">
                    <div class="node-circle" aria-hidden="true">4</div>
                    <div class="node-label">Polling Booth</div>
                </div>
                <div class="node" tabindex="0" role="button" aria-label="Step 5: Voting Day Process" style="left: 85%; top: 5%;" data-stop="5" data-title="Voting Day (EVM/VVPAT)">
                    <div class="node-circle" aria-hidden="true">5</div>
                    <div class="node-label">Voting Day</div>
                </div>
            </div>
        </section>
        
        <!-- Assistant Modal -->
        <aside id="assistant-panel" class="glass-panel hidden" aria-labelledby="assistant-title" role="dialog" aria-modal="false">
            <div class="panel-header">
                <div>
                  <h3 id="assistant-title" class="gradient-text">Tour Guide</h3>
                  <span class="online-indicator" aria-hidden="true"></span>
                </div>
                <button id="close-panel-btn" aria-label="Close Assistant Panel">&times;</button>
            </div>
            <div class="current-stop-info">
                <h4 id="stop-title-display" aria-live="polite">Stop Title</h4>
                <div id="calendar-link-container"></div>
            </div>
            <div id="chat-history" aria-live="polite" role="log">
                <!-- Chat messages injected here -->
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Ask about this stop..." aria-label="Type your question here">
                <button id="send-chat-btn" aria-label="Send message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </aside>
    </main>

    <!-- Debug & Log Downloader Tool -->
    <div id="debug-tool" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;">
        <button id="download-all-logs" style="background: #ff4757; color: white; border: none; padding: 10px 15px; border-radius: 50px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
            ⚠️ Download Debug Logs
        </button>
    </div>

    <script>
        // Global Client-Side Log Capture
        window.clientLogs = [];
        const originalLog = console.log;
        const originalError = console.error;

        console.log = function(...args) {
            window.clientLogs.push(`[INFO] ${new Date().toISOString()}: ${args.join(' ')}`);
            originalLog.apply(console, args);
        };

        console.error = function(...args) {
            window.clientLogs.push(`[ERROR] ${new Date().toISOString()}: ${args.join(' ')}`);
            originalError.apply(console, args);
        };

        window.onerror = function(msg, url, line) {
            console.error(`Uncaught Error: ${msg} at ${url}:${line}`);
        };

        document.getElementById('download-all-logs').addEventListener('click', async () => {
            const btn = document.getElementById('download-all-logs');
            btn.innerText = "Processing...";
            
            try {
                // 1. Fetch Server Logs
                const response = await fetch('/api/system/logs');
                let serverLogs = "";
                
                if (!response.ok || response.headers.get('content-type').includes('text/html')) {
                    serverLogs = "CRITICAL: Could not reach Flask server. The server is likely DOWN or blocked by a proxy.";
                } else {
                    serverLogs = await response.text();
                }

                // 2. Combine with Client Logs
                const combinedLogs = `=== CLIENT SIDE LOGS ===\n${window.clientLogs.join('\n')}\n\n=== SERVER SIDE LOGS ===\n${serverLogs}`;

                // 3. Trigger Download
                const blob = new Blob([combinedLogs], { type: 'text/plain' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `civic_journey_debug_${Date.now()}.txt`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                
                if (serverLogs.includes("CRITICAL")) {
                   btn.innerText = "❌ SERVER DOWN";
                } else {
                   btn.innerText = "✅ Logs Saved";
                }
                alert("Logs downloaded! Please share this file to diagnose the 'Continue' button crash.");
            } catch (err) {
                alert("Failed to fetch server logs. Downloaded client logs only.");
                console.error(err);
                btn.innerText = "Error Downloading";
            }
        });
    </script>

    <!-- ES6 Module import -->
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
